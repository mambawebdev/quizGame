<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div class="container">
        <!-- START SCREEN -->
         <div class="screen active" id="start-screen">
            <h1>PHP Exam Prep</h1>
            <p>Test your knowledge with these tough questions</p>
            <button id="start-btn">Start Quiz</button>
         </div>

         <!-- QUIZ SCREEN -->

        <!-- QUIZ SCREEN DEMO -->

        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">Question goes here</h2>
                <div class="quiz-info">
                    <p>
                        Question <span id="current-question">1</span> of <span id="total-questions">5</span>
                    </p>
                    <p>Score: <span id="score">0</span></p>
                </div>
                <!-- ADD THIS TIMER ELEMENT -->
                <div class="timer-container">
                    <svg class="timer-ring" width="80" height="80">
                        <circle class="timer-circle-bg" cx="40" cy="40" r="35"></circle>
                        <circle class="timer-circle" cx="40" cy="40" r="35"></circle>
                    </svg>
                    <div class="timer-text" id="timer-text">60</div>
                </div>
            </div>
            <div id="answers-container" class="answers-container">
                <!-- Answer buttons will be inserted here -->
            </div>
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
        </div>
         


        <div id="result-screen" class="screen">
            <h1>Quiz Results</h1>
            <div class="result-info">
            <p>You scored <span id="final-score">0</span> out of <span id="max-score">5</span></p>

            <div id="result-message">Good job!</div>
            </div>
            <button id="restart-btn">Restart Quiz</button>
        </div>
    </div>
    <script src="scripts/script.js" defer></script>
</body>
</html>
